name: gold_wallet
description: Non-custodial multi-chain crypto wallet
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # --- Wallet / crypto core ---
  bip39: ^1.0.6                # BIP39 mnemonic generation/validation
  bip32: ^2.0.0                # BIP32 HD key derivation
  web3dart: ^2.7.3             # Ethereum/EVM RPC + tx signing
  wallet_connect: ^0.0.14      # WalletConnect v2 (dApp sessions), swap if needed
  eth_sig_util: ^0.0.9         # message/typed-data signing helpers
  pointycastle: ^3.9.1         # low level crypto primitives (used by bip32/web3dart)

  # --- Secure local storage ---
  flutter_secure_storage: ^9.2.2   # Keychain (iOS) / Keystore (Android) backed storage
  local_auth: ^2.3.0               # biometric prompt
  crypto: ^3.0.3

  # --- Networking ---
  dio: ^5.5.0
  web_socket_channel: ^2.4.5

  # --- QR ---
  mobile_scanner: ^5.1.1
  qr_flutter: ^4.1.0
  image_picker: ^1.1.2

  # --- Utils / UI ---
  go_router: ^14.2.0
  flutter_svg: ^2.0.10
  intl: ^0.19.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  local_notifications: any
  flutter_local_notifications: ^17.2.1
  app_links: ^6.1.1               # deep links / WalletConnect callbacks
  package_info_plus: ^8.0.0
  device_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  freezed: ^2.5.5
  json_serializable: ^6.8.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
